<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="glow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF5C35;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#FF5C35;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative stack bars (right side, partially off-frame) -->
  <rect x="900" y="200" width="400" height="6" rx="3" fill="#FF5C35" opacity="0.9"/>
  <rect x="940" y="240" width="360" height="6" rx="3" fill="#FF5C35" opacity="0.6"/>
  <rect x="980" y="280" width="320" height="6" rx="3" fill="#FF5C35" opacity="0.35"/>
  <rect x="1020" y="320" width="280" height="6" rx="3" fill="#FF5C35" opacity="0.18"/>

  <!-- Corner accents -->
  <path d="M40 40 L120 40" stroke="#FF5C35" stroke-width="2" opacity="0.6"/>
  <path d="M40 40 L40 120" stroke="#FF5C35" stroke-width="2" opacity="0.6"/>
  <path d="M1160 590 L1080 590" stroke="#00C4A0" stroke-width="2" opacity="0.4"/>
  <path d="M1160 590 L1160 510" stroke="#00C4A0" stroke-width="2" opacity="0.4"/>

  <!-- "Full Stack" -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="300" fill="#9A9A96" letter-spacing="0.04em">
    Full Stack
  </text>

  <!-- "Vibe Coder" -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#F0F0EE" letter-spacing="-0.02em">
    Vibe Coder
  </text>

  <!-- Tagline -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#9A9A96">
    Your website, built and deployed. Real code you own.
  </text>

  <!-- URL -->
  <text x="80" y="540" font-family="monospace" font-size="14" font-weight="400" fill="#FF5C35" letter-spacing="0.06em">
    fullstackvibecoder.com
  </text>
</svg>
