<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="#0A0A0A"/>

  <!-- FSVC in LOVE arrangement: FS stacked over VC -->
  <!-- The V is tilted like the iconic O in LOVE -->

  <!-- F — top left -->
  <text x="26" y="95" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="#F0F0EE" letter-spacing="-0.03em">F</text>

  <!-- S — top right -->
  <text x="106" y="95" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="#F0F0EE" letter-spacing="-0.03em">S</text>

  <!-- V — bottom left, TILTED like the O in LOVE -->
  <g transform="rotate(-16, 58, 168)">
    <text x="20" y="182" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="#FF5C35" letter-spacing="-0.03em">V</text>
  </g>

  <!-- C — bottom right -->
  <text x="106" y="182" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="90" font-weight="900" fill="#FF5C35" letter-spacing="-0.03em">C</text>
</svg>
